apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apexruns.apex.io
spec:
  group: apex.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                targetRepo:
                  type: string
                  description: Git repository URL to analyze
                goal:
                  type: string
                  default: "scan project"
                mode:
                  type: string
                  enum: [report, supervised, autonomous]
                  default: report
                schedule:
                  type: string
                  description: Cron expression for periodic runs
                image:
                  type: string
                  default: "apex-orchestrator:latest"
            status:
              type: object
              properties:
                lastRunTime:
                  type: string
                lastResult:
                  type: string
                phase:
                  type: string
                  enum: [Pending, Running, Succeeded, Failed]
      additionalPrinterColumns:
        - name: Goal
          type: string
          jsonPath: .spec.goal
        - name: Mode
          type: string
          jsonPath: .spec.mode
        - name: Phase
          type: string
          jsonPath: .status.phase
  scope: Namespaced
  names:
    plural: apexruns
    singular: apexrun
    kind: ApexRun
    shortNames:
      - ar
