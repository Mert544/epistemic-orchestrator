name: automation-e2e

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .

      - name: Run test suite
        shell: bash
        run: |
          set -euo pipefail
          pytest -q

      - name: Smoke test — project_scan plan runs without error
        shell: bash
        env:
          EPISTEMIC_TARGET_ROOT: ${{ github.workspace }}/examples/synthetic_shop
          EPISTEMIC_AUTOMATION_PLAN: project_scan
          EPISTEMIC_OBJECTIVE: Scan the target project, extract meaningful implementation claims, and continue with constitution-driven fractal questioning.
        run: |
          set -euo pipefail
          # Just verify the orchestrator runs and produces a memory file
          python -m app.main
          test -f examples/synthetic_shop/.epistemic/memory.json
          echo "Smoke test passed — orchestrator ran and created memory.json"
