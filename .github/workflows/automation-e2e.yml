name: automation-e2e

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e .[dev] || pip install -e .

      - name: Run test suite
        shell: bash
        run: |
          set -euo pipefail
          pytest -q

      - name: Run project_scan automation plan
        shell: bash
        env:
          EPISTEMIC_TARGET_ROOT: ${{ github.workspace }}/examples/synthetic_shop
          EPISTEMIC_AUTOMATION_PLAN: project_scan
          EPISTEMIC_OBJECTIVE: Scan the target project, extract meaningful implementation claims, and continue with constitution-driven fractal questioning.
        run: |
          set -euo pipefail
          # Run and capture only stdout (JSON) to file, logs go to stderr
          python -m app.main 2> >(cat >&2) > project_scan.json
          python - <<'PY'
          import json
          from pathlib import Path

          text = Path('project_scan.json').read_text()
          # Extract first JSON object from output (ignore trailing log lines)
          start = text.find('{')
          end = text.rfind('}') + 1
          data = json.loads(text[start:end])
          assert data.get('plan_name') == 'project_scan', f"plan_name mismatch: {data.get('plan_name')}"
          print('project_scan passed')

          final = data.get('final_output', {})
          branches = final.get('branch_map', [])
          assert branches, 'branch_map empty'

          deep = [b for b in branches if b.count('.') >= 2]
          focus_branch = deep[0] if deep else sorted(branches)[0]
          Path('focus_branch.txt').write_text(focus_branch)
          print(f'focus_branch={focus_branch}')
          PY

      - name: Run focused_branch automation plan
        shell: bash
        env:
          EPISTEMIC_TARGET_ROOT: ${{ github.workspace }}/examples/synthetic_shop
          EPISTEMIC_AUTOMATION_PLAN: focused_branch
          EPISTEMIC_OBJECTIVE: Scan the target project, extract meaningful implementation claims, and continue with constitution-driven fractal questioning.
        run: |
          set -euo pipefail
          export EPISTEMIC_FOCUS_BRANCH="$(cat focus_branch.txt)"
          python -m app.main 2> >(cat >&2) > focused_branch.json
          python - <<'PY'
          import json
          from pathlib import Path

          focus_branch = Path('focus_branch.txt').read_text().strip()
          text = Path('focused_branch.json').read_text()
          start = text.find('{')
          end = text.rfind('}') + 1
          data = json.loads(text[start:end])

          assert data.get('plan_name') == 'focused_branch', f"plan_name mismatch: {data.get('plan_name')}"
          assert data.get('steps'), 'no steps found'
          print('focused_branch passed')
          PY

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-e2e-artifacts
          if-no-files-found: warn
          path: |
            project_scan.json
            focused_branch.json
            focus_branch.txt
