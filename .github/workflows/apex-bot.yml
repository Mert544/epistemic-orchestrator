name: Apex Bot
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  apex-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python scripts/apex_github_bot.py --mode=report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
