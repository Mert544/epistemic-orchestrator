<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Orchestrator — Consensus Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 30px;
        }
        header h1 { font-size: 2.5rem; color: #38bdf8; margin-bottom: 10px; }
        header p { color: #94a3b8; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }
        .stat-card h3 { font-size: 0.875rem; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; }
        .stat-card .value { font-size: 2rem; font-weight: 700; }
        .stat-card.approve .value { color: #4ade80; }
        .stat-card.reject .value { color: #f87171; }
        .stat-card.abstain .value { color: #fbbf24; }
        .panel {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .panel h2 {
            font-size: 1.25rem;
            margin-bottom: 16px;
            color: #38bdf8;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .claim-item {
            background: #0f172a;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #475569;
            transition: all 0.2s;
        }
        .claim-item:hover { transform: translateX(4px); }
        .claim-item.approved { border-left-color: #4ade80; }
        .claim-item.rejected { border-left-color: #f87171; }
        .claim-item.abstained { border-left-color: #fbbf24; }
        .claim-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .claim-title { font-weight: 600; font-size: 1.05rem; }
        .claim-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .claim-status.approve { background: #14532d; color: #4ade80; }
        .claim-status.reject { background: #7f1d1d; color: #f87171; }
        .claim-status.abstain { background: #713f12; color: #fbbf24; }
        .votes-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .vote-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.8125rem;
            background: #1e293b;
        }
        .vote-badge .agent { color: #94a3b8; }
        .vote-badge .verdict { font-weight: 600; }
        .vote-badge .verdict.approve { color: #4ade80; }
        .vote-badge .verdict.reject { color: #f87171; }
        .vote-badge .verdict.abstain { color: #fbbf24; }
        .confidence-bar {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        .confidence-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .confidence-fill.high { background: #4ade80; }
        .confidence-fill.medium { background: #fbbf24; }
        .confidence-fill.low { background: #f87171; }
        .debate-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #334155;
        }
        .debate-round {
            font-size: 0.8125rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .argument {
            background: #1e293b;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 0.875rem;
        }
        .argument .agent-name { color: #38bdf8; font-weight: 600; }
        footer {
            text-align: center;
            padding: 30px;
            color: #64748b;
            font-size: 0.875rem;
            border-top: 1px solid #334155;
            margin-top: 30px;
        }
        .refresh-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
            transition: transform 0.2s;
        }
        .refresh-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Apex Orchestrator</h1>
            <p>Agent Consensus Dashboard — Real-time claim evaluation monitoring</p>
        </header>

        <div class="stats-grid" id="stats">
            <div class="stat-card approve">
                <h3>Approved</h3>
                <div class="value" id="stat-approved">0</div>
            </div>
            <div class="stat-card reject">
                <h3>Rejected</h3>
                <div class="value" id="stat-rejected">0</div>
            </div>
            <div class="stat-card abstain">
                <h3>Abstained</h3>
                <div class="value" id="stat-abstained">0</div>
            </div>
            <div class="stat-card">
                <h3>Consensus Rate</h3>
                <div class="value" id="stat-rate">0%</div>
            </div>
        </div>

        <div class="panel">
            <h2>Claims Under Review</h2>
            <div id="claims-list">
                <p style="color: #64748b; text-align: center; padding: 40px;">Loading consensus data...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>Apex Orchestrator — Agents for fractal codebase intelligence</p>
    </footer>

    <button class="refresh-btn" onclick="loadData()" title="Refresh">&#x21bb;</button>

    <script>
        // Default demo data — in production, this fetches from /api/consensus
        let consensusData = [];

        function renderClaim(result) {
            const statusClass = result.verdict.toLowerCase();
            const statusText = result.verdict;
            const confidencePct = Math.round(result.confidence * 100);
            const confidenceClass = confidencePct >= 70 ? 'high' : confidencePct >= 40 ? 'medium' : 'low';

            let votesHtml = result.votes.map(v => `
                <div class="vote-badge">
                    <span class="agent">${v.agent}</span>
                    <span class="verdict ${v.verdict.toLowerCase()}">${v.verdict}</span>
                    <span style="color: #64748b">${Math.round(v.confidence * 100)}%</span>
                </div>
            `).join('');

            let debateHtml = '';
            if (result.rounds && result.rounds.length > 0) {
                debateHtml = `
                    <div class="debate-section">
                        <div class="debate-round">Debate: ${result.rounds.length} round(s)</div>
                        ${result.rounds[0].arguments.map(a => `
                            <div class="argument">
                                <span class="agent-name">${a.agent}:</span> ${a.argument}
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            return `
                <div class="claim-item ${statusClass}">
                    <div class="claim-header">
                        <div class="claim-title">${result.claim}</div>
                        <div class="claim-status ${statusClass}">${statusText}</div>
                    </div>
                    <div class="votes-row">${votesHtml}</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill ${confidenceClass}" style="width: ${confidencePct}%"></div>
                    </div>
                    ${debateHtml}
                </div>
            `;
        }

        function updateStats(results) {
            const approved = results.filter(r => r.verdict === 'APPROVE').length;
            const rejected = results.filter(r => r.verdict === 'REJECT').length;
            const abstained = results.filter(r => r.verdict === 'ABSTAIN').length;
            const total = results.length;
            const rate = total > 0 ? Math.round((approved + rejected) / total * 100) : 0;

            document.getElementById('stat-approved').textContent = approved;
            document.getElementById('stat-rejected').textContent = rejected;
            document.getElementById('stat-abstained').textContent = abstained;
            document.getElementById('stat-rate').textContent = rate + '%';
        }

        function loadData() {
            // Try to fetch from local API endpoint
            fetch('/api/consensus')
                .then(r => r.json())
                .then(data => {
                    consensusData = data;
                    render();
                })
                .catch(() => {
                    // Use demo data if API unavailable
                    consensusData = getDemoData();
                    render();
                });
        }

        function render() {
            const container = document.getElementById('claims-list');
            if (consensusData.length === 0) {
                container.innerHTML = '<p style="color: #64748b; text-align: center; padding: 40px;">No consensus data available</p>';
                return;
            }
            container.innerHTML = consensusData.map(renderClaim).join('');
            updateStats(consensusData);
        }

        function getDemoData() {
            return [
                {
                    claim: "Add docstrings to all public functions",
                    verdict: "APPROVE",
                    confidence: 0.73,
                    votes: [
                        {agent: "security", verdict: "APPROVE", confidence: 0.7},
                        {agent: "docstring", verdict: "APPROVE", confidence: 0.8},
                        {agent: "test_stub", verdict: "ABSTAIN", confidence: 0.5},
                        {agent: "dependency", verdict: "ABSTAIN", confidence: 0.5},
                    ],
                    rounds: []
                },
                {
                    claim: "Use eval() for dynamic configuration loading",
                    verdict: "REJECT",
                    confidence: 0.85,
                    votes: [
                        {agent: "security", verdict: "REJECT", confidence: 0.85},
                        {agent: "docstring", verdict: "ABSTAIN", confidence: 0.5},
                        {agent: "test_stub", verdict: "ABSTAIN", confidence: 0.5},
                        {agent: "dependency", verdict: "ABSTAIN", confidence: 0.5},
                    ],
                    rounds: [
                        {
                            arguments: [
                                {agent: "security", argument: "eval() allows arbitrary code execution — critical security risk"}
                            ]
                        }
                    ]
                },
                {
                    claim: "Reduce dependency coupling in auth module",
                    verdict: "APPROVE",
                    confidence: 0.74,
                    votes: [
                        {agent: "security", verdict: "APPROVE", confidence: 0.7},
                        {agent: "docstring", verdict: "ABSTAIN", confidence: 0.5},
                        {agent: "test_stub", verdict: "ABSTAIN", confidence: 0.5},
                        {agent: "dependency", verdict: "APPROVE", confidence: 0.8},
                    ],
                    rounds: []
                },
            ];
        }

        // Auto-refresh every 10 seconds
        setInterval(loadData, 10000);
        loadData();
    </script>
</body>
</html>
